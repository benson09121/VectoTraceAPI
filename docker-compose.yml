services:

  postgressql:
    container_name: vectotrace_db
    image: postgres:latest
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASS}
      - POSTGRES_DB={DB_NAME}
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB}" ]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    container_name: vectotrace_redis
    image: redis:latest
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data

